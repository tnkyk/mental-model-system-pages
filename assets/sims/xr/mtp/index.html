<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MTP Latency Lab | Mental Model Studio</title>
<style>
:root{color-scheme:dark;--mm-ink:#f0ede6;--mm-muted:#b0aea6;--mm-paper:#0b0c0c;--mm-white:#161818;--mm-line:#3d3f3e;--mm-plus:#a8bdd0;--mm-green:#7ec9a8;--mm-gold:#f0ede6;--mm-gold-soft:rgba(240,237,230,.10);--mm-green-soft:rgba(126,201,168,.18);--mm-red-soft:rgba(168,189,208,.16);--mm-blue-soft:rgba(168,189,208,.22);--mm-gray-soft:#1c1e1e;}
body{margin:0;font:14px/1.6 system-ui,"Noto Sans JP",sans-serif;color:var(--mm-ink);background:var(--mm-paper);padding:20px;}
.sim-root{border:1px solid var(--mm-line);background:var(--mm-white);padding:18px;max-width:760px;margin:0 auto;}
h1{font-size:17px;margin:0 0 10px;}
.sim-hard-claim{padding:10px 12px;background:var(--mm-gold-soft);border-left:3px solid var(--mm-gold);font-size:13px;margin:0 0 14px;}
.row{display:grid;grid-template-columns:110px 1fr 48px;gap:8px;align-items:center;margin:8px 0;}
.track{height:16px;background:var(--mm-gray-soft);border:1px solid var(--mm-line);}
.bar{height:100%;background:var(--mm-plus);}
.bar.warn{background:var(--mm-green);}
.total{margin-top:14px;padding:12px;border:1px solid var(--mm-line);background:var(--mm-paper);}
.sim-controls label{font-size:13px;color:var(--mm-muted);}
input[type=range]{width:100%;}
.sim-btn{border:1px solid var(--mm-line);background:var(--mm-paper);color:var(--mm-ink);padding:6px 10px;cursor:pointer;font:inherit;margin:6px 4px 0 0;}
.sim-status{margin-top:12px;padding:10px 12px;font-size:13px;}
.ok{background:var(--mm-green-soft);} .bad{background:var(--mm-red-soft);}
.sim-fallback{margin-top:10px;padding:10px 12px;background:var(--mm-gray-soft);font-size:12px;color:var(--mm-muted);}
</style>
</head>
<body>
<div class="sim-root">
  <h1>Motion-to-Photon Stack Lab（教育用トイ）</h1>
  <p class="sim-hard-claim"><strong>Hard claim:</strong> MTPは「fpsが高い」ことと同義ではない。センサ・アプリ・描画・表示の遅延の和が、世界が釘付けに感じるかを左右する（実務目標の目安として ~20ms が語られる）。</p>
  <div class="row"><div>センサ</div><div class="track"><div class="bar" id="b0"></div></div><div id="v0">4</div></div>
  <div class="row"><div>アプリ</div><div class="track"><div class="bar" id="b1"></div></div><div id="v1">8</div></div>
  <div class="row"><div>描画</div><div class="track"><div class="bar" id="b2"></div></div><div id="v2">7</div></div>
  <div class="row"><div>表示</div><div class="track"><div class="bar" id="b3"></div></div><div id="v3">6</div></div>
  <div class="sim-controls">
    <label>各段 (ms)</label>
    <input type="range" id="s0" min="1" max="25" value="4">
    <input type="range" id="s1" min="1" max="40" value="8">
    <input type="range" id="s2" min="1" max="30" value="7">
    <input type="range" id="s3" min="1" max="25" value="6">
    <button type="button" class="sim-btn" id="good">低遅延プリセット</button>
    <button type="button" class="sim-btn" id="bad">60fpsでも遅いプリセット</button>
    <label style="display:block;margin-top:8px;"><input type="checkbox" id="pred"> 予測／再投影で向き遅延を見かけ上減らす（並進や新規画素は別）</label>
  </div>
  <div class="total">合計 MTP（模式）: <strong id="sum">—</strong> ms　／　実効（予測後・模式）: <strong id="eff">—</strong> ms</div>
  <div class="sim-status ok" id="st">—</div>
  <p class="sim-fallback"><strong>簡略化の開示：</strong> 段の分け方は教育用です。Carmack の「~20ms 未満は一般に知覚されにくい」は絶対法則ではなく実務目標の目安。予測は遅延を消すのではなく補償します。</p>
</div>
<script>
(function(){
  var ids=['s0','s1','s2','s3'];
  function update(){
    var vals=ids.map(function(id){return +document.getElementById(id).value;});
    var max=40; var sum=vals.reduce(function(a,b){return a+b;},0);
    vals.forEach(function(v,i){
      document.getElementById('v'+i).textContent=v;
      var b=document.getElementById('b'+i); b.style.width=(100*v/max)+'%'; b.className='bar'+(v>12?' warn':'');
    });
    var pred=document.getElementById('pred').checked;
    var eff=pred? Math.max(3, sum - Math.min(12, vals[1]*0.6+vals[2]*0.3)) : sum;
    document.getElementById('sum').textContent=sum;
    document.getElementById('eff').textContent=eff.toFixed(0);
    var st=document.getElementById('st');
    if(eff<=20){st.className='sim-status ok'; st.textContent='実効がおおよそ20ms帯：釘付け感が出やすい実務目標帯（個人差あり）。';}
    else if(eff<=35){st.className='sim-status bad'; st.textContent='遅れが知覚され始め、世界が体から剥がれやすい。fps表示だけ見て安心しない。';}
    else{st.className='sim-status bad'; st.textContent='明確に遅い。60fpsでも段の和が大きければこうなる（Carmackの指摘の模式）。';}
  }
  ids.forEach(function(id){document.getElementById(id).addEventListener('input',update);});
  document.getElementById('pred').addEventListener('change',update);
  document.getElementById('good').onclick=function(){s0.value=2;s1.value=5;s2.value=5;s3.value=4;pred.checked=true;update();};
  document.getElementById('bad').onclick=function(){s0.value=8;s1.value=18;s2.value=12;s3.value=14;pred.checked=false;update();};
  update();
})();
</script>
</body>
</html>
