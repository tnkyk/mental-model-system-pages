<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registration Lab | Mental Model Studio</title>
<style>
:root{color-scheme:dark;--mm-ink:#f0ede6;--mm-muted:#b0aea6;--mm-paper:#0b0c0c;--mm-white:#161818;--mm-line:#3d3f3e;--mm-plus:#a8bdd0;--mm-green:#7ec9a8;--mm-gold:#f0ede6;--mm-gold-soft:rgba(240,237,230,.10);--mm-green-soft:rgba(126,201,168,.18);--mm-red-soft:rgba(168,189,208,.16);--mm-gray-soft:#1c1e1e;}
body{margin:0;font:14px/1.6 system-ui,"Noto Sans JP",sans-serif;color:var(--mm-ink);background:var(--mm-paper);padding:20px;}
.sim-root{border:1px solid var(--mm-line);background:var(--mm-white);padding:18px;max-width:760px;margin:0 auto;}
h1{font-size:17px;margin:0 0 10px;}
.sim-hard-claim{padding:10px 12px;background:var(--mm-gold-soft);border-left:3px solid var(--mm-gold);font-size:13px;margin:0 0 14px;}
.view{position:relative;height:220px;border:1px solid var(--mm-line);background:linear-gradient(#1a1c1c,#121414);margin:12px 0;overflow:hidden;}
.real{position:absolute;left:120px;top:70px;width:140px;height:90px;border:2px solid var(--mm-green);background:rgba(126,201,168,.12);}
.real:after{content:'現実の机コーナー';position:absolute;bottom:-22px;left:0;font-size:11px;color:var(--mm-muted);}
.virt{position:absolute;width:140px;height:90px;border:2px dashed var(--mm-plus);background:rgba(168,189,208,.15);}
.virt:after{content:'仮想の軸／注釈';position:absolute;bottom:-22px;left:0;font-size:11px;color:var(--mm-muted);}
.sim-controls label{display:block;margin:8px 0 4px;font-size:13px;color:var(--mm-muted);}
input[type=range]{width:min(420px,90%);}
.sim-btn{border:1px solid var(--mm-line);background:var(--mm-paper);color:var(--mm-ink);padding:6px 10px;cursor:pointer;font:inherit;margin:4px 4px 0 0;}
.sim-status{margin-top:12px;padding:10px 12px;font-size:13px;}
.ok{background:var(--mm-green-soft);} .bad{background:var(--mm-red-soft);}
.sim-fallback{margin-top:10px;padding:10px 12px;background:var(--mm-gray-soft);font-size:12px;color:var(--mm-muted);}
</style>
</head>
<body>
<div class="sim-root">
  <h1>Registration Error Lab（教育用トイ）</h1>
  <p class="sim-hard-claim"><strong>Hard claim:</strong> ARで仮想物が「泳ぐ／ずれる」のは、しばしばアプリ美学ではなく登録誤差＝頭部／環境追跡の誤差が現実との相対として見えることである。</p>
  <div class="sim-controls">
    <label>追跡誤差（px） <span id="err">0</span></label>
    <input type="range" id="e" min="0" max="40" value="0">
    <label>頭振りノイズ <span id="nz">0</span></label>
    <input type="range" id="n" min="0" max="20" value="0">
    <button type="button" class="sim-btn" id="shake">頭を振る</button>
    <button type="button" class="sim-btn" id="reset">誤差ゼロ</button>
  </div>
  <div class="view"><div class="real"></div><div class="virt" id="virt"></div></div>
  <div class="sim-status ok" id="st">—</div>
  <p class="sim-fallback"><strong>簡略化の開示：</strong> 2Dの平行ずれで登録を表現したトイです。実際は6DoF・レンズ歪み・遅延も重なります。Azuma の「登録が最大の障害」を体感する目的です。</p>
</div>
<script>
(function(){
  var virt=document.getElementById('virt'), e=document.getElementById('e'), n=document.getElementById('n');
  var baseL=120, baseT=70, jig=0;
  function update(){
    document.getElementById('err').textContent=e.value;
    document.getElementById('nz').textContent=n.value;
    var dx=+e.value + (Math.sin(jig)* (+n.value));
    var dy=+e.value*0.4 + (Math.cos(jig*1.3)*(+n.value)*0.6);
    virt.style.left=(baseL+dx)+'px'; virt.style.top=(baseT+dy)+'px';
    var st=document.getElementById('st');
    var mag=Math.hypot(dx,dy);
    if(mag<3){st.className='sim-status ok'; st.textContent='登録良好：仮想が現実の縁に釘付け。錯覚が保たれる。';}
    else if(mag<15){st.className='sim-status bad'; st.textContent='軽度のずれ：動くと「泳ぐ」。ユーザーはUIバグと呼びがちだが、追跡誤差の顔。';}
    else{st.className='sim-status bad'; st.textContent='大きな登録誤差：ARの本質的失敗モード。解像度を上げてもこの請求書は消えない。';}
  }
  e.addEventListener('input',update); n.addEventListener('input',update);
  document.getElementById('reset').onclick=function(){e.value=0;n.value=0;jig=0;update();};
  document.getElementById('shake').onclick=function(){
    var t0=performance.now();
    function frame(t){ jig=(t-t0)/80; update(); if(t-t0<1200) requestAnimationFrame(frame); else {jig=0; update();} }
    requestAnimationFrame(frame);
  };
  update();
})();
</script>
</body>
</html>
