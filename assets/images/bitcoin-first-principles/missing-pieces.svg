<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" role="img" aria-labelledby="t d">
  <title id="t">先行欠落と合成</title>
  <desc id="d">Hashcash・b-money・白書問題が合成へ向かう</desc>
  <rect width="900" height="280" fill="#0b0c0c"/>

  <text x="450" y="34" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="15" font-weight="700" fill="#f0ede6">先行の欠落 → 合成の必然（年表ではない）</text>
  <rect x="40" y="70" width="200" height="120" fill="#161818" stroke="#3d3f3e"/>
  <text x="140" y="110" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="13" font-weight="700" fill="#b0aea6">Hashcash</text>
  <text x="140" y="138" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="12" fill="#b0aea6">コスト非対称</text>
  <text x="140" y="158" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="12" fill="#b0aea6">（追記の値段）</text>
  <rect x="280" y="70" width="200" height="120" fill="#161818" stroke="#3d3f3e"/>
  <text x="380" y="110" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="13" font-weight="700" fill="#b0aea6">b-money</text>
  <text x="380" y="138" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="12" fill="#b0aea6">分散台帳のスケッチ</text>
  <text x="380" y="158" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="12" fill="#b0aea6">（共有履歴）</text>
  <rect x="520" y="70" width="200" height="120" fill="#161818" stroke="#a8bdd0"/>
  <text x="620" y="110" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="13" font-weight="700" fill="#a8bdd0">白書の問題</text>
  <text x="620" y="138" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="12" fill="#b0aea6">二重支払い ×</text>
  <text x="620" y="158" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="12" fill="#b0aea6">信頼第三者なし</text>
  <path d="M240 130 H270" stroke="#3d3f3e" stroke-width="2"/><path d="M480 130 H510" stroke="#3d3f3e" stroke-width="2"/>
  <path d="M720 130 H750" stroke="#7ec9a8" stroke-width="2" marker-end="url(#a)"/>
  <rect x="760" y="85" width="110" height="90" fill="#161818" stroke="#7ec9a8" stroke-width="2"/>
  <text x="815" y="125" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="12" font-weight="700" fill="#7ec9a8">合成</text>
  <text x="815" y="148" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="11" fill="#b0aea6">共有履歴</text>
  <text x="815" y="166" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="11" fill="#b0aea6">＋コスト追記</text>
  <text x="450" y="245" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="12" fill="#b0aea6">Lesson: 先行は博物館展示ではなく、足りなかった部品の地図。</text>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7ec9a8"/></marker></defs>

</svg>
