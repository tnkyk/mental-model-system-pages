<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" role="img" aria-labelledby="t d">
  <title id="t">物理現金とデジタルコピーの対比</title>
  <desc id="d">左は渡せば手元から減る現金。右は送っても手元に残るファイル。</desc>
  <rect width="820" height="280" fill="#f1f6f7"/>
  <rect x="28" y="36" width="360" height="208" rx="4" fill="#fff" stroke="#d8e0e6"/>
  <text x="48" y="68" font-family="IBM Plex Sans, Noto Sans JP, sans-serif" font-size="15" font-weight="700" fill="#263d59">物理の現金</text>
  <circle cx="120" cy="150" r="38" fill="#e9f7f3" stroke="#16836f" stroke-width="2"/>
  <text x="108" y="156" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="700" fill="#16836f">¥</text>
  <path d="M175 150 H250" stroke="#1677b8" stroke-width="3" marker-end="url(#a)"/>
  <circle cx="300" cy="150" r="38" fill="#eaf4fb" stroke="#1677b8" stroke-width="2"/>
  <text x="288" y="156" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="700" fill="#1677b8">¥</text>
  <text x="48" y="220" font-family="IBM Plex Sans, Noto Sans JP, sans-serif" font-size="13" fill="#536271">渡すと、手元から減る</text>
  <rect x="432" y="36" width="360" height="208" rx="4" fill="#fff" stroke="#d8e0e6"/>
  <text x="452" y="68" font-family="IBM Plex Sans, Noto Sans JP, sans-serif" font-size="15" font-weight="700" fill="#263d59">デジタルのファイル</text>
  <rect x="470" y="112" width="70" height="50" rx="3" fill="#fff5df" stroke="#b77912"/>
  <text x="485" y="142" font-family="ui-monospace, monospace" font-size="12" fill="#b77912">file</text>
  <path d="M560 137 H620" stroke="#b54749" stroke-width="3" marker-end="url(#b)"/>
  <rect x="640" y="100" width="70" height="50" rx="3" fill="#fff5df" stroke="#b77912"/>
  <text x="655" y="130" font-family="ui-monospace, monospace" font-size="12" fill="#b77912">file</text>
  <rect x="640" y="160" width="70" height="50" rx="3" fill="#fceeee" stroke="#b54749"/>
  <text x="655" y="190" font-family="ui-monospace, monospace" font-size="12" fill="#b54749">copy</text>
  <text x="452" y="220" font-family="IBM Plex Sans, Noto Sans JP, sans-serif" font-size="13" fill="#536271">送っても、手元のコピーが残る</text>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1677b8"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#b54749"/></marker>
  </defs>
</svg>
