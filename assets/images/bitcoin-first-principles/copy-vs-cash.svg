<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" role="img" aria-labelledby="t d">
  <title id="t">物理現金とデジタルコピーの対比</title>
  <desc id="d">左は渡せば減る現金。右は送っても残るファイル。</desc>
  <rect width="820" height="280" fill="#0b0c0c"/>
  <rect x="28" y="36" width="360" height="208" fill="#161818" stroke="#3d3f3e"/>
  <text x="48" y="68" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="15" font-weight="700" fill="#f0ede6">物理の現金</text>
  <circle cx="120" cy="150" r="38" fill="#0b0c0c" stroke="#7ec9a8" stroke-width="2"/>
  <text x="120" y="156" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="18" font-weight="700" fill="#7ec9a8">¥</text>
  <path d="M175 150 H250" stroke="#a8bdd0" stroke-width="3" marker-end="url(#a)"/>
  <circle cx="300" cy="150" r="38" fill="#0b0c0c" stroke="#a8bdd0" stroke-width="2"/>
  <text x="300" y="156" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="18" font-weight="700" fill="#a8bdd0">¥</text>
  <text x="48" y="220" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="13" fill="#b0aea6">渡すと、手元から減る</text>
  <rect x="432" y="36" width="360" height="208" fill="#161818" stroke="#3d3f3e"/>
  <text x="452" y="68" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="15" font-weight="700" fill="#f0ede6">デジタルのファイル</text>
  <rect x="470" y="112" width="70" height="50" fill="#0b0c0c" stroke="#f0ede6"/>
  <text x="505" y="142" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="12" fill="#f0ede6">file</text>
  <path d="M560 137 H620" stroke="#a8bdd0" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#b)"/>
  <rect x="640" y="100" width="70" height="50" fill="#0b0c0c" stroke="#f0ede6"/>
  <text x="675" y="130" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="12" fill="#f0ede6">file</text>
  <rect x="640" y="160" width="70" height="50" fill="#0b0c0c" stroke="#a8bdd0" stroke-dasharray="4 3"/>
  <text x="675" y="190" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="12" fill="#a8bdd0">copy</text>
  <text x="452" y="220" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="13" fill="#b0aea6">送っても、手元のコピーが残る</text>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#a8bdd0"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#a8bdd0"/></marker>
  </defs>
</svg>
