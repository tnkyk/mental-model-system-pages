<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 230" role="img" aria-labelledby="t d">
  <title id="t">Motion-to-photon は段の和</title>
  <desc id="d">センサから光子までの遅延積み上げ</desc>
  <rect width="720" height="230" fill="#0b0c0c"/>
  <text x="360" y="28" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="15" font-weight="700" fill="#f0ede6">Motion-to-photon は段の和</text>

  <g font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="12">
    <rect x="80" y="55" width="120" height="50" fill="#161818" stroke="#a8bdd0" stroke-width="2"/><text x="140" y="85" text-anchor="middle" fill="#a8bdd0" font-weight="700">センサ</text>
    <rect x="220" y="55" width="120" height="50" fill="#161818" stroke="#f0ede6" stroke-width="2"/><text x="280" y="85" text-anchor="middle" fill="#f0ede6" font-weight="700">アプリ</text>
    <rect x="360" y="55" width="120" height="50" fill="#161818" stroke="#f0ede6" stroke-width="2"/><text x="420" y="85" text-anchor="middle" fill="#f0ede6" font-weight="700">描画</text>
    <rect x="500" y="55" width="120" height="50" fill="#161818" stroke="#7ec9a8" stroke-width="2"/><text x="560" y="85" text-anchor="middle" fill="#7ec9a8" font-weight="700">表示</text>
    <path d="M200 80 H220" stroke="#3d3f3e" stroke-width="2" marker-end="url(#arr)"/>
    <path d="M340 80 H360" stroke="#3d3f3e" stroke-width="2" marker-end="url(#arr)"/>
    <path d="M480 80 H500" stroke="#3d3f3e" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="140" y="130" width="400" height="44" fill="#161818" stroke="#3d3f3e" stroke-width="2"/>
    <text x="340" y="158" text-anchor="middle" fill="#f0ede6" font-weight="700">合計 MTP ＝ 段の和（fps 単体ではない）</text>
    <text x="340" y="200" text-anchor="middle" fill="#b0aea6">予測・再投影は消去ではなく補償</text>
  </g>

  <text x="360" y="216" text-anchor="middle" font-family="'Noto Sans JP','IBM Plex Sans',sans-serif" font-size="11" fill="#b0aea6">Lesson: 60fps でも段の和が大きければ「遅い」。</text>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3d3f3e"/></marker></defs>
</svg>
